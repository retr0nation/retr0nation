name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: retr0nation
          outputs_dir: dist
          output_branch: output
          generate_github_token: true
          generate_branch: true
          gif_tool_options: "--repeat 2 --delay 80 --colors 00d4ff-0d1117"
