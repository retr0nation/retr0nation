  <text x="600" y="158" font-family="Consolas, Monaco, monospace" font-size="22" fill="#00d4ff" text-anchor="middle">music × code × AI</text>
  <text x="600" y="190" font-family="Consolas, Monaco, monospace" font-size="16" fill="#8b949e" text-anchor="middle">AINET.Solutions · retr0.ainet.solutions</text>
  <text x="600" y="222" font-family="Consolas, Monaco, monospace" font-size="13" fill="#484f58" text-anchor="middle">/// architect of Rex · Gibby · Kobe</text>
